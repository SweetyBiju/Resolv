<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Resolv</title>
  <meta name="description" content="Create your Resolv account to start splitting expenses with your groups.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
  <div class="auth-shell">
    <a href="index.html" class="auth-logo">RESOLV<span>.</span></a>

    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>

      <form id="register-form" novalidate>
        <div style="display:flex;flex-direction:column;gap:var(--space-4)">

          <div class="form-group">
            <label class="form-label" for="reg-username">Username</label>
            <input class="form-input" type="text" id="reg-username"
                   name="username" autocomplete="username" required
                   placeholder="yourname">
            <span class="form-error" id="reg-username-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="form-input" type="email" id="reg-email"
                   name="email" autocomplete="email" required
                   placeholder="you@example.com">
            <span class="form-error" id="reg-email-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="reg-password"
                     name="password" autocomplete="new-password" required
                     placeholder="••••••••">
              <button type="button" class="input-toggle" id="reg-pw-toggle"
                      aria-label="Show password">👁</button>
            </div>
            <span class="form-error" id="reg-password-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-confirm">Confirm Password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="reg-confirm"
                     name="confirm_password" autocomplete="new-password" required
                     placeholder="••••••••">
              <button type="button" class="input-toggle" id="reg-confirm-toggle"
                      aria-label="Show confirm password">👁</button>
            </div>
            <span class="form-error" id="reg-confirm-error" role="alert"></span>
          </div>

          <div id="reg-global-error" class="form-error" role="alert" style="text-align:center"></div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="reg-submit">
            CREATE ACCOUNT
          </button>
        </div>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html" id="reg-login-link">Log in</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="js/pages/register.js"></script>
</body>
</html>
