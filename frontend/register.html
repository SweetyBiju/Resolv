<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolv | Join the Crew</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: {
                        'comic': '6px 6px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-black min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white border-4 border-black shadow-comic w-full max-w-lg p-8">
        <h2 class="text-4xl font-black uppercase tracking-tighter mb-2">Create Account</h2>
        <p class="font-bold text-gray-600 uppercase tracking-widest text-xs mb-8">Start splitting with accountability</p>
        
        <form id="register-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
                <label class="block font-black uppercase text-xs mb-2">Username</label>
                <input type="text" id="username" required
                    class="w-full border-4 border-black p-3 font-bold focus:bg-yellow-50 outline-none"
                    placeholder="money_master">
            </div>

            <div>
                <label class="block font-black uppercase text-xs mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full border-4 border-black p-3 font-bold focus:bg-yellow-50 outline-none pr-12"
                        placeholder="********">
                    
                    <button type="button" id="toggle-password" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black transition-colors focus:outline-none">
                        <i data-lucide="eye" id="eye-icon" stroke-width="3"></i>
                    </button>
                </div>
                
                <div class="mt-2 text-[10px] font-black uppercase tracking-wider flex flex-col gap-1">
                    <span id="req-len" class="text-gray-400 transition-colors">- At least 8 characters</span>
                    <span id="req-num" class="text-gray-400 transition-colors">- At least 1 number</span>
                    <span id="req-sym" class="text-gray-400 transition-colors">- At least 1 symbol</span>
                </div>
            </div>
            <div>
                <label class="block font-black uppercase text-xs mb-2">Email</label>
                <input type="email" id="email" required
                    class="w-full border-4 border-black p-3 font-bold focus:bg-yellow-50 outline-none"
                    placeholder="hello@resolv.app">
            </div>

            <div class="md:col-span-1">
                <label class="block font-black uppercase text-xs mb-2">UPI ID (For Payments)</label>
                <input type="text" id="upi_id" required
                    class="w-full border-4 border-black p-3 font-bold focus:bg-lime-50 outline-none"
                    placeholder="user@okaxis">
            </div>

            <div class="md:col-span-1">
                <label class="block font-black uppercase text-xs mb-2">Currency</label>
                <select id="currency_preference" 
                    class="w-full border-4 border-black p-3 font-bold bg-white focus:bg-blue-50 outline-none appearance-none">
                    <option value="INR">INR (₹)</option>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                </select>
            </div>

            <div id="error-message" class="hidden md:col-span-2 bg-pink-400 border-4 border-black p-3 font-black text-sm uppercase">
                Registration failed. Check your details.
            </div>

            <button type="submit" id="submit-btn"
                class="md:col-span-2 bg-yellow-300 border-4 border-black p-4 shadow-comic font-black uppercase tracking-widest hover:bg-yellow-200 active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 mt-4">
                <span>Join Resolv</span>
                <i data-lucide="user-plus" stroke-width="4"></i>
            </button>
        </form>

        <p class="mt-8 text-center font-bold">
            Already a member? <a href="login.html" class="text-blue-600 underline decoration-4 underline-offset-4">Log In</a>
        </p>
    </div>

   <script type="module">
        import { api } from './js/core/api.js';
        import { auth } from './js/core/auth.js';
        import { utils } from './js/core/utils.js';

        lucide.createIcons();
        auth.checkGuestAndRedirect();

        const form = document.getElementById('register-form');
        const errorDiv = document.getElementById('error-message');
        const passwordInput = document.getElementById('password');
        
        // Checklist Elements
        const reqLen = document.getElementById('req-len');
        const reqNum = document.getElementById('req-num');
        const reqSym = document.getElementById('req-sym');

        // Toggle Password Elements
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        // FEATURE 1: Toggle Password Visibility
        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons(); // Re-render the specific icon
        });

        // FEATURE 2: Hide error banner when user starts typing again
        form.addEventListener('input', () => {
            if (!errorDiv.classList.contains('hidden')) {
                errorDiv.classList.add('hidden');
            }
        });

        // Real-time password checking
        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            
            val.length >= 8 
                ? (reqLen.className = 'text-lime-600 transition-colors') 
                : (reqLen.className = 'text-gray-400 transition-colors');
                
            /\d/.test(val) 
                ? (reqNum.className = 'text-lime-600 transition-colors') 
                : (reqNum.className = 'text-gray-400 transition-colors');
                
            /[!@#$%^&*(),.?":{}|<>]/.test(val) 
                ? (reqSym.className = 'text-lime-600 transition-colors') 
                : (reqSym.className = 'text-gray-400 transition-colors');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            utils.hapticFeedback('medium');
            errorDiv.classList.add('hidden');
            
            const password = passwordInput.value;

            if (password.length < 8 || !/\d/.test(password) || !/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                errorDiv.innerText = "Please meet all password requirements.";
                errorDiv.classList.remove('hidden');
                utils.hapticFeedback('error');
                return;
            }
            
            const payload = {
                username: document.getElementById('username').value,
                password: password,
                email: document.getElementById('email').value,
                upi_id: document.getElementById('upi_id').value,
                currency_preference: document.getElementById('currency_preference').value,
            };

            try {
                const response = await api.request('/api/users/register/', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                if (response) {
                    window.location.href = 'login.html?registered=true';
                }
            } catch (err) {
                utils.hapticFeedback('error');
                errorDiv.classList.remove('hidden');
                
                // FEATURE 3: Specific Error Messages from Django
                // DRF usually returns errors as arrays inside object keys
                if (err.email) {
                    errorDiv.innerText = "user with this email already exists." // e.g., "user with this email already exists."
                } else if (err.username) {
                    errorDiv.innerText = err.username[0];
                } else if (err.password) {
                    errorDiv.innerText = err.password[0];
                } else {
                    errorDiv.innerText = "Registration failed. Check your details.";
                }
            }
        });
    </script>
</body>
</html>
