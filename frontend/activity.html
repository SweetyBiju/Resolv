<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Log — Resolv</title>
  <meta name="description" content="Full audit trail of all your activity on Resolv.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .timeline-date { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); padding: var(--space-4) 0 var(--space-2); }
    .activity-entry { display: flex; align-items: flex-start; gap: var(--space-3); padding: var(--space-4) 0; border-bottom: var(--border); cursor: pointer; transition: background 0.1s; }
    .activity-entry:last-child { border-bottom: none; }
    .activity-entry:hover { background: var(--bg-page); border-radius: var(--radius); padding-left: var(--space-2); }
    .activity-icon { width: 36px; height: 36px; border: var(--border); border-radius: 50%; background: var(--bg-page); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .activity-body { flex: 1; }
    .activity-action { font-weight: 700; font-size: var(--text-sm); text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-primary); }
    .activity-detail { font-size: var(--text-sm); color: var(--text-secondary); margin-top: 2px; }
    .activity-time { font-size: var(--text-xs); color: var(--text-muted); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .activity-expanded { background: var(--bg-page); border: var(--border); border-radius: var(--radius); padding: var(--space-4); margin-top: var(--space-2); font-size: var(--text-sm); display: none; }
    .activity-expanded.open { display: block; }
    .diff-table { width: 100%; border-collapse: collapse; }
    .diff-table th { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; padding: var(--space-2); border-bottom: var(--border); text-align: left; }
    .diff-table td { padding: var(--space-2); border-bottom: var(--border); color: var(--text-secondary); font-size: var(--text-sm); }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main">
    <header id="topbar">
      <span class="topbar-title">Activity Log</span>
      <div class="topbar-right">
        <a href="profile.html" class="topbar-user">
          <div class="avatar" id="topbar-avatar">?</div>
          <span class="topbar-username" id="topbar-username"></span>
        </a>
      </div>
    </header>
    <main id="content">

      <div class="page-header">
        <h1 class="page-title">Activity Log</h1>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="select-wrapper">
          <select class="form-select" id="filter-action" style="min-width:200px">
            <option value="">All Actions</option>
            <option value="EXPENSE_CREATED">Expense Created</option>
            <option value="EXPENSE_UPDATED">Expense Updated</option>
            <option value="EXPENSE_DELETED">Expense Deleted</option>
            <option value="SETTLEMENT_CREATED">Settlement Created</option>
            <option value="SETTLEMENT_CONFIRMED">Settlement Confirmed</option>
            <option value="SETTLEMENT_CANCELLED">Settlement Cancelled</option>
            <option value="GROUP_CREATED">Group Created</option>
            <option value="MEMBER_ADDED">Member Added</option>
            <option value="MEMBER_REMOVED">Member Removed</option>
          </select>
        </div>
        <input class="form-input" type="date" id="filter-from" title="From date" style="width:auto">
        <input class="form-input" type="date" id="filter-to" title="To date" style="width:auto">
        <button class="btn btn-ghost btn-sm" id="btn-clear-filters">Clear</button>
      </div>

      <!-- Timeline -->
      <div id="activity-timeline"></div>
      <div id="activity-empty" class="empty-state hidden">No activity yet.</div>

      <div style="text-align:center;margin-top:var(--space-6)" id="load-more-wrap" class="hidden">
        <button class="btn btn-outline" id="btn-load-more">Load More</button>
      </div>

    </main>
  </div>
  <div id="bottom-nav"></div>
</div>

<div id="toast-container"></div>
<script type="module" src="js/pages/activity.js?v=2"></script>
</body>
</html>
