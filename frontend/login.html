<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolv | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: {
                        'comic': '6px 6px 0px 0px rgba(0,0,0,1)',
                        'comic-sm': '3px 3px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-blue-50 text-black min-h-screen flex flex-col items-center justify-center p-6">

    <div class="mb-8 text-center">
        <h1 class="text-6xl font-black tracking-tighter uppercase italic">
            Resolv<span class="text-purple-400">.</span>
        </h1>
        <p class="font-bold uppercase tracking-widest text-sm mt-2">No more awkward money talks</p>
    </div>

    <div class="bg-white border-4 border-black shadow-comic w-full max-w-md p-8">
        <h2 class="text-3xl font-black uppercase mb-6">Welcome Back</h2>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block font-black uppercase tracking-wider text-xs mb-2">Username</label>
                <input type="text" id="username" required
                    class="w-full border-4 border-black p-3 font-bold focus:outline-none focus:bg-yellow-50 transition-colors"
                    placeholder="chill_guy_99">
            </div>

            <div>
                <label class="block font-black uppercase tracking-wider text-xs mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full border-4 border-black p-3 font-bold focus:outline-none focus:bg-yellow-50 transition-colors pr-12"
                        placeholder="********">
                    <button type="button" id="toggle-password" 
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black transition-colors focus:outline-none">
                        <i data-lucide="eye" id="eye-icon" stroke-width="3"></i>
                    </button>
                </div>
            </div>

            <div id="error-message" class="hidden bg-pink-400 border-4 border-black p-3 font-bold text-sm">
                Invalid credentials. Try again.
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-purple-400 border-4 border-black p-4 shadow-comic font-black uppercase tracking-widest hover:bg-purple-300 active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2">
                <span>Enter the App</span>
                <i data-lucide="arrow-right" stroke-width="4"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t-4 border-black text-center">
            <p class="font-bold mb-4">New here?</p>
            <a href="register.html" 
               class="inline-block bg-lime-400 border-4 border-black px-6 py-2 shadow-comic font-black uppercase tracking-widest hover:bg-lime-300 active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
                Create Account
            </a>
        </div>
    </div>

    <div class="fixed -bottom-10 -left-10 w-40 h-40 bg-yellow-300 border-4 border-black -rotate-12 -z-10 shadow-comic"></div>
    <div class="fixed -top-10 -right-10 w-32 h-32 bg-pink-400 border-4 border-black rotate-12 -z-10 shadow-comic"></div>

    <script type="module">
        import { api } from './js/core/api.js';
        import { auth } from './js/core/auth.js';
        import { utils } from './js/core/utils.js';

        // Initialize Lucide Icons
        lucide.createIcons();

        // Guard: If already logged in, skip to dashboard
        auth.checkGuestAndRedirect();

        const loginForm = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        // Toggle Password Visibility
        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons(); // Re-render the specific icon
        });

        // Hide error banner when user starts typing again
        loginForm.addEventListener('input', () => {
            if (!errorDiv.classList.contains('hidden')) {
                errorDiv.classList.add('hidden');
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Feedback
            submitBtn.disabled = true;
            submitBtn.innerText = "Verifying...";
            errorDiv.classList.add('hidden');
            utils.hapticFeedback('medium');

            const username = document.getElementById('username').value;
            const password = passwordInput.value;

            try {
                const data = await api.login({ username, password });
                
                if (data && data.access) {
                    auth.setSession(data.access, data.refresh);
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Authentication failed');
                }
            } catch (err) {
                console.error(err);
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Enter the App</span><i data-lucide="arrow-right" stroke-width="4"></i>`;
                lucide.createIcons();
                utils.hapticFeedback('error');
            }
        });
    </script>
</body>
</html>
