<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Resolv</title>
  <meta name="description" content="Log in to your Resolv account to manage group expenses and settlements.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
  <div class="auth-shell">
    <a href="index.html" class="auth-logo">RESOLV<span>.</span></a>

    <div class="auth-card">
      <h1 class="auth-title">Log In</h1>

      <form id="login-form" novalidate>
        <div style="display:flex;flex-direction:column;gap:var(--space-4)">

          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input class="form-input" type="email" id="login-email"
                   name="email" autocomplete="email" required
                   placeholder="you@example.com">
            <span class="form-error" id="login-email-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="login-password"
                     name="password" autocomplete="current-password" required
                     placeholder="••••••••">
              <button type="button" class="input-toggle" id="login-pw-toggle"
                      aria-label="Show password">👁</button>
            </div>
            <span class="form-error" id="login-password-error" role="alert"></span>
          </div>

          <div id="login-global-error" class="form-error" role="alert" style="text-align:center"></div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-submit">
            LOG IN
          </button>
        </div>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html" id="login-register-link">Register</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
