<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Resolv</title>
  <meta name="description" content="View and edit your profile, change your password, manage your account.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main">
    <header id="topbar">
      <span class="topbar-title">Profile</span>
      <div class="topbar-right">
        <a href="profile.html" class="topbar-user">
          <div class="avatar" id="topbar-avatar">?</div>
          <span class="topbar-username" id="topbar-username"></span>
        </a>
      </div>
    </header>
    <main id="content">

      <div class="page-header">
        <h1 class="page-title">Profile</h1>
      </div>

      <div class="profile-layout">

        <!-- LEFT: Profile Card -->
        <div style="display:flex;flex-direction:column;gap:var(--space-6)">

          <div class="card" style="text-align:center">
            <div class="avatar avatar-xl" id="profile-avatar" style="margin:0 auto var(--space-4)">?</div>
            <div style="font-size:var(--text-2xl);font-weight:700;text-transform:uppercase" id="profile-username">—</div>
            <div style="color:var(--text-muted);font-size:var(--text-sm);margin-top:var(--space-1)" id="profile-email">—</div>
            <div style="margin-top:var(--space-4)">
              <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)">Member Since</div>
              <div style="font-weight:600" id="profile-since">—</div>
            </div>
          </div>

          <!-- Reliability Score Card -->
          <div style="background:var(--purple);border:var(--border-thick);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:var(--space-6);color:#fff;text-align:center">
            <div style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;opacity:0.8;margin-bottom:var(--space-2)">Reliability Score</div>
            <div style="font-size:var(--text-3xl);font-weight:700;line-height:1" id="profile-score">—</div>
            <div style="font-size:var(--text-xs);opacity:0.7;margin-top:var(--space-2)" id="profile-currency-badge">—</div>
          </div>

        </div>

        <!-- RIGHT: Edit Forms -->
        <div style="display:flex;flex-direction:column;gap:var(--space-6)">

          <!-- Edit Profile -->
          <div class="card">
            <div class="card-header"><span class="card-title">Edit Profile</span></div>
            <form id="profile-form" novalidate>
              <div style="display:flex;flex-direction:column;gap:var(--space-4)">
                <div class="form-group">
                  <label class="form-label" for="pf-username">Username</label>
                  <input class="form-input" type="text" id="pf-username">
                  <span class="form-error" id="pf-username-error"></span>
                </div>
                <div class="form-group">
                  <label class="form-label" for="pf-email">Email</label>
                  <input class="form-input" type="email" id="pf-email" disabled style="opacity:0.6">
                  <span class="form-error" id="pf-email-error"></span>
                </div>
                <div class="form-group">
                  <label class="form-label" for="pf-currency">Currency Preference</label>
                  <div class="select-wrapper">
                    <select class="form-select" id="pf-currency">
                      <option value="INR">INR — Indian Rupee</option>
                      <option value="USD">USD — US Dollar</option>
                      <option value="EUR">EUR — Euro</option>
                      <option value="GBP">GBP — British Pound</option>
                      <option value="SGD">SGD — Singapore Dollar</option>
                    </select>
                  </div>
                </div>
                <span class="form-error" id="pf-global-error"></span>
                <button type="submit" class="btn btn-primary" id="pf-submit">Save Changes</button>
              </div>
            </form>
          </div>

          <!-- Change Password -->
          <div class="card">
            <div class="card-header"><span class="card-title">Change Password</span></div>
            <form id="password-form" novalidate>
              <div style="display:flex;flex-direction:column;gap:var(--space-4)">
                <div class="form-group">
                  <label class="form-label" for="pw-current">Current Password</label>
                  <input class="form-input" type="password" id="pw-current" autocomplete="current-password">
                  <span class="form-error" id="pw-current-error"></span>
                </div>
                <div class="form-group">
                  <label class="form-label" for="pw-new">New Password</label>
                  <input class="form-input" type="password" id="pw-new" autocomplete="new-password">
                  <span class="form-error" id="pw-new-error"></span>
                </div>
                <div class="form-group">
                  <label class="form-label" for="pw-confirm">Confirm New Password</label>
                  <input class="form-input" type="password" id="pw-confirm" autocomplete="new-password">
                  <span class="form-error" id="pw-confirm-error"></span>
                </div>
                <span class="form-error" id="pw-global-error"></span>
                <button type="submit" class="btn btn-outline" id="pw-submit">Change Password</button>
              </div>
            </form>
          </div>

          <!-- Danger Zone -->
          <div class="danger-zone">
            <div class="danger-zone-title">⚠ Danger Zone</div>
            <p class="text-sm" style="margin-bottom:var(--space-4)">Logging out will clear your session from this device.</p>
            <button class="btn btn-danger" id="btn-logout">Logout from All Devices</button>
          </div>

        </div>
      </div>

    </main>
  </div>
  <div id="bottom-nav"></div>
</div>

<div id="toast-container"></div>
<script type="module" src="js/pages/profile.js"></script>
</body>
</html>
