<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolv | Command Center</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: { 
                        'comic': '6px 6px 0px 0px rgba(0,0,0,1)',
                        'comic-sm': '3px 3px 0px 0px rgba(0,0,0,1)' 
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #eff6ff; border-left: 3px solid #000; }
        ::-webkit-scrollbar-thumb { background: #000; border: 2px solid #eff6ff; }
    </style>
</head>
<body class="bg-blue-50 text-black min-h-screen pb-24 md:pb-0 overflow-hidden">

    <div class="flex flex-col md:flex-row min-h-screen h-screen">
        
        <nav class="w-full md:w-64 bg-white border-b-4 md:border-b-0 md:border-r-4 border-black p-6 flex flex-col sticky top-0 md:h-screen z-20 flex-shrink-0 overflow-y-auto">
            <h1 class="text-4xl font-black uppercase italic mb-10 tracking-tighter">Resolv<span class="text-purple-400">.</span></h1>
            
            <div class="space-y-4 flex-grow">
                <a href="dashboard.html" class="flex items-center gap-3 p-3 bg-yellow-300 border-4 border-black shadow-comic font-black uppercase text-sm transition-all">
                    <i data-lucide="layout-dashboard" stroke-width="4"></i> Dashboard
                </a>
                <a href="groups.html" class="flex items-center gap-3 p-3 border-4 border-black hover:bg-slate-100 font-black uppercase text-sm transition-all">
                    <i data-lucide="users" stroke-width="4"></i> Groups
                </a>
                <a href="transactions.html" class="flex items-center gap-3 p-3 border-4 border-black hover:bg-slate-100 font-black uppercase text-sm transition-all">
                    <i data-lucide="arrow-left-right" stroke-width="4"></i> Activity
                </a>
                <a href="profile.html" class="flex items-center gap-3 p-3 border-4 border-black hover:bg-slate-100 font-black uppercase text-sm transition-all">
                    <i data-lucide="user" stroke-width="4"></i> Profile
                </a>
            </div>

            <button id="logout-btn" class="mt-8 flex items-center gap-3 p-3 border-4 border-black hover:bg-pink-400 font-black uppercase text-sm transition-all">
                <i data-lucide="log-out" stroke-width="4"></i> Log Out
            </button>
        </nav>

        <main class="flex-grow p-6 md:p-12 overflow-y-auto relative w-full">
            
            <div id="alert-banner" class="hidden fixed top-10 left-1/2 transform -translate-x-1/2 z-[100] border-4 border-black p-4 font-black uppercase text-sm shadow-comic w-11/12 max-w-md text-center transition-all bg-white"></div>

            <div class="bg-purple-400 border-4 border-black shadow-comic p-6 md:p-8 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h2 class="text-4xl font-black uppercase tracking-widest text-white mb-2">Trust Score</h2>
                    <div id="trust-insight" class="bg-black text-yellow-300 px-3 py-1.5 text-[10px] font-black uppercase tracking-widest inline-block border-2 border-black">
                        Analyzing your activity...
                    </div>
                </div>
                <div class="text-6xl font-black tracking-tighter bg-white border-4 border-black px-8 py-3 shadow-comic">
                    <span id="reliability-score">0.0</span>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-5 bg-white border-4 border-black shadow-comic p-6 md:p-8 flex flex-col justify-center min-h-[250px]">
                    <h3 class="font-black uppercase tracking-widest text-xs text-gray-500 mb-6">Balance Breakdown</h3>
                    <div id="balance-wrapper" class="w-full">
                        </div>
                </div>

                <div class="lg:col-span-7 space-y-6 flex flex-col min-h-[250px]">
                    <h3 class="font-black uppercase tracking-widest text-xs flex items-center gap-2">
                        <i data-lucide="zap" class="text-yellow-500 fill-yellow-500" stroke-width="3"></i> Immediate Actions
                    </h3>
                    <div id="actions-container" class="space-y-4 flex-grow content-start">
                        <div class="animate-pulse bg-slate-200 border-4 border-black h-24 w-full"></div>
                    </div>
                </div>

                <div class="lg:col-span-5 bg-white border-4 border-black shadow-comic p-8 flex flex-col min-h-[300px] mt-4 lg:mt-0">
                    <h3 class="font-black uppercase tracking-widest text-xs text-gray-500 mb-4">Your Spend Breakdown</h3>
                    <div class="relative flex-grow min-h-[200px]">
                        <canvas id="category-chart"></canvas>
                    </div>
                </div>

                <div class="lg:col-span-7 flex flex-col mt-4 lg:mt-0">
                    <div class="flex justify-between items-end mb-4">
                        <h3 class="font-black uppercase tracking-widest text-xs text-gray-500">Recent Activity</h3>
                        <a href="transactions.html" class="font-black text-[10px] uppercase underline decoration-2 underline-offset-4 hover:text-purple-600 transition-colors">Full History</a>
                    </div>
                    <div id="activity-strip" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="animate-pulse bg-slate-200 border-4 border-black h-20 w-full"></div>
                        <div class="animate-pulse bg-slate-200 border-4 border-black h-20 w-full"></div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    
    <script type="module">
        import { api } from './js/core/api.js';
        import { auth } from './js/core/auth.js';
        import { utils } from './js/core/utils.js';
        import { ui } from './js/core/ui.js';

        let chartInstance = null; 

        // --- MATH HELPERS ---
        function round2(value) { return Math.round(parseFloat(value || 0) * 100) / 100; }
        function resolveUsername(username, userId) {
            if (username && String(username).trim() !== '') return username;
            if (userId) return `User #${userId}`;
            return 'Deleted User';
        }

        lucide.createIcons();
        auth.checkAuthAndRedirect();

        document.getElementById('logout-btn').addEventListener('click', () => auth.logout());

        async function initDashboard() {
            try {
                const [user, expenses, settlements, activeGroups] = await Promise.all([
                    api.request('/api/users/me/'),
                    api.request('/api/expenses/'),
                    api.request('/api/settlements/'),
                    api.getGroups()
                ]);

                const currentUserId = user.id;

                // 1. Math Engine
                const balanceData = computeRealBalances(expenses, settlements, currentUserId, activeGroups);

                // 2. Trust Score & Dynamic Insight
                if (user) {
                    utils.animateNumber(document.getElementById('reliability-score'), 0, parseFloat(user.reliability_score || 0), 1000);
                    updateTrustInsight(balanceData.totalIOwe); // Pass totalIOwe directly
                }

                // 3. Render Dual Display Net Balance Summary
                renderNetBalance(balanceData);

                // 4. Render Immediate Actions
                renderActions(settlements, balanceData.breakdown, currentUserId);

                // 5. Render Category Spend Chart
                renderCategoryChart(expenses, currentUserId);

                // 6. Recent Activity Strip
                renderActivity(expenses, settlements);

            } catch (err) {
                console.error("Dashboard Load Error:", err);
                showAlert("Failed to load dashboard data.", "error");
            }
        }

        // --- MATH ENGINE ---
        function computeRealBalances(expenses, settlements, currentUserId, activeGroups) {
            const currId = String(currentUserId);
            const activeGroupIds = activeGroups ? new Set(activeGroups.map(g => String(g.id))) : null;
            const balances = {};

            function ensureEntry(userId, username) {
                const uid = String(userId);
                if (!balances[uid]) {
                    balances[uid] = { username: resolveUsername(username, userId), netAmount: 0, groupAmounts: {} };
                }
            }

            function addGroupDelta(userId, groupId, delta) {
                const uid = String(userId); const gid = String(groupId);
                if (!balances[uid].groupAmounts[gid]) balances[uid].groupAmounts[gid] = 0;
                balances[uid].groupAmounts[gid] = round2(balances[uid].groupAmounts[gid] + delta);
            }

            expenses.forEach(exp => {
                if (activeGroupIds && !activeGroupIds.has(String(exp.group))) return;
                const payerId = String(exp.paid_by);
                const payerName = resolveUsername(exp.paid_by_username, exp.paid_by);

                if (!exp.splits || !Array.isArray(exp.splits)) return;

                exp.splits.forEach(split => {
                    const owerId = String(split.user);
                    const owerName = resolveUsername(split.username, split.user);
                    const amount = round2(split.amount_owed);

                    if (amount <= 0) return;

                    if (payerId === currId && owerId !== currId) {
                        ensureEntry(owerId, owerName);
                        balances[owerId].netAmount = round2(balances[owerId].netAmount + amount);
                        addGroupDelta(owerId, exp.group, amount);
                    } else if (owerId === currId && payerId !== currId) {
                        ensureEntry(payerId, payerName);
                        balances[payerId].netAmount = round2(balances[payerId].netAmount - amount);
                        addGroupDelta(payerId, exp.group, -amount);
                    }
                });
            });

            settlements.forEach(s => {
                if (s.status.toUpperCase() !== 'CONFIRMED') return;
                if (activeGroupIds && !activeGroupIds.has(String(s.group))) return;

                const amount = round2(s.amount);
                if (amount <= 0) return;

                const payerId = String(s.payer);
                const payerName = resolveUsername(s.payer_username, s.payer);
                const receiverId = String(s.receiver);
                const receiverName = resolveUsername(s.receiver_username, s.receiver);

                if (receiverId === currId && payerId !== currId) {
                    ensureEntry(payerId, payerName);
                    balances[payerId].netAmount = round2(balances[payerId].netAmount - amount);
                    addGroupDelta(payerId, s.group, -amount);
                } else if (payerId === currId && receiverId !== currId) {
                    ensureEntry(receiverId, receiverName);
                    balances[receiverId].netAmount = round2(balances[receiverId].netAmount + amount);
                    addGroupDelta(receiverId, s.group, amount);
                }
            });

            let totalNet = 0; let totalOwedToMe = 0; let totalIOwe = 0; const breakdown = [];

            for (const [userId, data] of Object.entries(balances)) {
                const net = round2(data.netAmount);
                totalNet = round2(totalNet + net);

                if (net > 0.01) totalOwedToMe = round2(totalOwedToMe + net);
                else if (net < -0.01) totalIOwe = round2(totalIOwe + Math.abs(net));

                if (Math.abs(net) > 0.01) {
                    let primaryGroupId = null; let maxAbs = 0;
                    for (const [gid, gamt] of Object.entries(data.groupAmounts)) {
                        if (Math.abs(gamt) > maxAbs) { maxAbs = Math.abs(gamt); primaryGroupId = gid; }
                    }
                    breakdown.push({ userId, name: data.username, amount: net, primaryGroupId });
                }
            }

            breakdown.sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount));
            return { totalNet, totalOwedToMe, totalIOwe, breakdown };
        }

        // --- RENDERERS ---
        function updateTrustInsight(totalIOwe) {
            const insightEl = document.getElementById('trust-insight');
            
            // FIX 3: Check Gross Debt, not Net Balance.
            if (totalIOwe > 0.01) {
                insightEl.innerText = `You owe ₹${totalIOwe.toFixed(0)} right now. Time to settle up!`;
                insightEl.className = 'bg-red-600 text-white px-3 py-1.5 text-[10px] font-black uppercase tracking-widest inline-block border-2 border-black';
            } else {
                insightEl.innerText = "Great job! You have zero outstanding debts.";
                insightEl.className = 'bg-lime-300 text-black px-3 py-1.5 text-[10px] font-black uppercase tracking-widest inline-block border-2 border-black';
            }
        }

        function renderNetBalance(balanceData) {
            const { totalNet, totalOwedToMe, totalIOwe, breakdown } = balanceData;
            const wrapper = document.getElementById('balance-wrapper');

            // FIX 1: Dual Display for Absolute Clarity
            let headerHtml = `
                <div class="flex justify-between items-center text-xs md:text-sm font-black uppercase text-blue-600 mb-2">
                    <span>You Are Owed</span>
                    <span>${utils.formatCurrency(totalOwedToMe)}</span>
                </div>
                <div class="flex justify-between items-center text-xs md:text-sm font-black uppercase text-red-600 pb-3 border-b-4 border-black border-dashed mb-3">
                    <span>You Owe</span>
                    <span>${utils.formatCurrency(totalIOwe)}</span>
                </div>
                <div class="flex justify-between items-end mb-4">
                    <span class="font-black uppercase text-[10px] text-gray-500 mb-1 tracking-widest">Net Pos/Neg</span>
                    <span class="text-4xl md:text-5xl font-black tracking-tighter ${totalNet >= 0 ? 'text-black' : 'text-red-600'}">
                        ${totalNet > 0 ? '+' : ''}${utils.formatCurrency(totalNet)}
                    </span>
                </div>
            `;

            let breakdownHtml = '';
            if (breakdown.length === 0) {
                breakdownHtml = `<div class="text-[10px] font-black uppercase tracking-widest text-gray-500 bg-gray-100 p-3 border-2 border-black inline-block w-full text-center">No active debts</div>`;
            } else {
                // FIX 2: Unambiguous Directional Language
                breakdownHtml = breakdown.map(p => `
                    <div class="flex justify-between items-center text-[10px] md:text-xs font-black uppercase bg-slate-50 p-3 border-2 border-black mb-2 last:mb-0 shadow-comic-sm">
                        <span>${p.amount > 0 ? p.name + ' OWES YOU' : 'YOU OWE ' + p.name}</span>
                        <span class="${p.amount > 0 ? 'text-blue-600' : 'text-red-600'} whitespace-nowrap">
                            ${utils.formatCurrency(Math.abs(p.amount))}
                        </span>
                    </div>
                `).join('');
            }

            wrapper.innerHTML = headerHtml + '<div class="mt-4">' + breakdownHtml + '</div>';
        }

        function renderActions(settlements, breakdownList, currentUserId) {
            const container = document.getElementById('actions-container');
            let actionsHtml = '';

            // 1. Pending Incoming Settlements (Require Confirmation)
            const pending = settlements.filter(s => String(s.receiver) === String(currentUserId) && s.status.toUpperCase() === 'PENDING');
            
            pending.forEach(s => {
                actionsHtml += `
                <div class="bg-yellow-300 border-4 border-black shadow-comic p-4 flex justify-between items-center hover:-translate-y-1 transition-transform">
                    <div class="flex items-center gap-3">
                        <div class="bg-white border-2 border-black p-2 rounded-full shrink-0"><i data-lucide="clock" class="w-4 h-4 text-yellow-600" stroke-width="3"></i></div>
                        <div class="min-w-0">
                            <p class="font-black uppercase text-xs truncate">${s.payer_username} sent ${utils.formatCurrency(s.amount)}</p>
                            <p class="font-bold text-[9px] uppercase text-gray-700 mt-0.5">Approve to update balance</p>
                        </div>
                    </div>
                    <button data-settle-id="${s.id}" class="confirm-action-btn bg-black text-white px-3 py-2 font-black uppercase text-[10px] hover:bg-gray-800 active:translate-y-1 transition-all shadow-comic-sm shrink-0 ml-2">Confirm</button>
                </div>`;
            });

            // 2. Reminder to Pay (If I owe someone)
            // FIX 4: Alarming visual treatment for debts owed
            breakdownList.forEach(b => {
                if (b.amount < 0) {
                    actionsHtml += `
                    <div class="bg-red-500 border-4 border-black shadow-comic p-4 flex justify-between items-center hover:-translate-y-1 transition-transform">
                        <div class="flex items-center gap-3">
                            <div class="bg-white border-2 border-black p-2 rounded-full shrink-0"><i data-lucide="alert-triangle" class="w-4 h-4 text-red-600" stroke-width="3"></i></div>
                            <div class="min-w-0">
                                <p class="font-black uppercase text-[10px] tracking-widest text-white truncate">You Owe ${b.name}</p>
                                <p class="font-black text-xl text-white mt-0.5">${utils.formatCurrency(Math.abs(b.amount))}</p>
                            </div>
                        </div>
                        <a href="group-detail.html?id=${b.primaryGroupId || ''}" class="bg-yellow-300 text-black border-2 border-black px-4 py-2 font-black uppercase text-[10px] hover:bg-yellow-400 active:translate-y-1 transition-all shadow-comic-sm shrink-0 ml-2">Settle Up</a>
                    </div>`;
                }
            });

            if (!actionsHtml) {
                container.innerHTML = `<div class="bg-white border-4 border-black border-dashed p-8 flex flex-col items-center justify-center text-center"><i data-lucide="check-circle-2" class="w-8 h-8 text-lime-500 mb-2" stroke-width="3"></i><p class="font-black uppercase text-xs text-gray-500 tracking-widest">You're all caught up!</p></div>`;
            } else {
                container.innerHTML = actionsHtml;
            }
            
            lucide.createIcons();

            container.querySelectorAll('.confirm-action-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-settle-id');
                    e.currentTarget.disabled = true;
                    e.currentTarget.innerText = 'WAIT...';
                    utils.hapticFeedback('medium');
                    try {
                        await api.request(`/api/settlements/${id}/confirm_settlement/`, { method: 'POST' });
                        confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 }, ticks: 400, gravity: 0.8 });
                        showAlert('Payment Confirmed!', 'success');
                        setTimeout(() => { initDashboard(); }, 1500);
                    } catch (err) {
                        showAlert("Failed to confirm.", "error");
                        e.currentTarget.disabled = false;
                        e.currentTarget.innerText = 'CONFIRM';
                    }
                });
            });
        }

        function renderCategoryChart(expenses, currentUserId) {
            const catTotals = { 'FOOD': 0, 'TRAVEL': 0, 'HOUSING': 0, 'ENTERTAINMENT': 0, 'OTHER': 0 };
            
            expenses.forEach(e => {
                let myShare = 0;
                const payerId = String(e.paid_by);
                
                if (payerId === String(currentUserId)) {
                    myShare = parseFloat(e.amount || 0);
                    if (e.splits) {
                        e.splits.forEach(s => {
                            if (String(s.user) !== String(currentUserId)) {
                                myShare -= parseFloat(s.amount_owed || 0);
                            }
                        });
                    }
                } else {
                    if (e.splits) {
                        const mySplit = e.splits.find(s => String(s.user) === String(currentUserId));
                        if (mySplit) myShare = parseFloat(mySplit.amount_owed || 0);
                    }
                }
                
                if (myShare > 0) {
                    const cat = e.category ? e.category.toUpperCase() : 'OTHER';
                    if (catTotals[cat] !== undefined) catTotals[cat] += myShare;
                    else catTotals['OTHER'] += myShare;
                }
            });

            const labels = Object.keys(catTotals);
            const data = Object.values(catTotals);
            const hasData = data.some(v => v > 0);

            const ctx = document.getElementById('category-chart').getContext('2d');
            if (chartInstance) chartInstance.destroy(); 

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: hasData ? data : [1], 
                        backgroundColor: hasData 
                            ? ['#fde047', '#a3e635', '#f472b6', '#c084fc', '#60a5fa'] 
                            : ['#f1f5f9'], 
                        borderColor: '#000000',
                        borderWidth: 3,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%', 
                    plugins: {
                        legend: { 
                            position: 'right', 
                            labels: { 
                                font: { family: 'Inter', weight: '900', size: 10 }, 
                                color: '#000',
                                padding: 15,
                                usePointStyle: true,
                                pointStyle: 'rect'
                            } 
                        },
                        tooltip: { 
                            enabled: hasData,
                            backgroundColor: '#000',
                            titleFont: { family: 'Inter', weight: '900' },
                            bodyFont: { family: 'Inter', weight: '700' },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return ` ₹${context.raw.toFixed(2)}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderActivity(expenses, settlements) {
            const container = document.getElementById('activity-strip');
            
            const formattedExpenses = expenses.map(e => ({
                id: e.id,
                title: e.title,
                amount: e.amount,
                date: e.date || e.created_at,
                type: 'expense'
            }));

            const formattedSettlements = settlements.map(s => ({
                id: s.id,
                title: `Sent to ${s.receiver_username}`,
                amount: s.amount,
                date: s.created_at,
                type: 'settlement'
            }));

            const recent = [...formattedExpenses, ...formattedSettlements]
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .slice(0, 4);

            if (recent.length === 0) {
                container.innerHTML = `<div class="col-span-full border-4 border-black border-dashed p-6 text-center"><p class="font-black uppercase text-xs text-gray-400">No recent activity.</p></div>`;
                return;
            }

            container.innerHTML = recent.map(item => `
                <div class="bg-white border-4 border-black p-4 shadow-comic hover:-translate-y-1 hover:shadow-comic-sm transition-all cursor-pointer group" onclick="window.location.href='transactions.html'">
                    <div class="flex justify-between items-start mb-2">
                        <div class="bg-${item.type === 'expense' ? 'blue-100' : 'yellow-100'} border-2 border-black p-1.5 shrink-0">
                            <i data-lucide="${item.type === 'expense' ? 'receipt' : 'check-circle'}" class="w-4 h-4" stroke-width="3"></i>
                        </div>
                        <span class="text-sm font-black text-right whitespace-nowrap pl-2">${utils.formatCurrency(item.amount)}</span>
                    </div>
                    <p class="font-black uppercase text-[10px] text-gray-600 truncate group-hover:text-black transition-colors">${item.title}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showAlert(message, type) {
            const banner = document.getElementById('alert-banner');
            banner.innerText = message;
            banner.classList.remove('hidden', 'bg-lime-300', 'bg-pink-400', 'text-white');
            
            if (type === 'success') {
                banner.classList.add('bg-lime-300', 'text-black');
            } else {
                banner.classList.add('bg-pink-400', 'text-black');
            }
            
            banner.classList.remove('hidden');
            setTimeout(() => banner.classList.add('hidden'), 4000);
        }

        initDashboard();
    </script>
</body>
</html>
