<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Resolv</title>
  <meta name="description" content="Your financial overview — trust score, balances, pending settlements and recent activity.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .trust-hero {
      background: var(--purple);
      border: var(--border-thick);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: var(--space-6) var(--space-8);
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--space-6);
      flex-wrap: wrap; gap: var(--space-4);
      color: #fff;
    }
    .trust-label { font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.8; margin-bottom: var(--space-1); }
    .trust-score-box { background: rgba(255,255,255,0.15); border: 2px solid #fff; border-radius: var(--radius); padding: var(--space-3) var(--space-6); text-align: center; min-width: 100px; }
    .trust-score-num { font-size: var(--text-3xl); font-weight: 700; line-height: 1; }
    .trust-score-label { font-size: var(--text-xs); font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
    .trust-pill { display: inline-flex; align-items: center; padding: 4px var(--space-3); border-radius: 100px; font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-top: var(--space-2); }
    .trust-pill-green { background: var(--green); color: #fff; }
    .trust-pill-red   { background: var(--red);   color: #fff; }
    .balance-amount   { font-size: var(--text-2xl); font-weight: 700; }
    .balance-label    { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .action-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3) 0; border-bottom: var(--border);
    }
    .action-row:last-child { border-bottom: none; }
    .activity-row {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) 0; border-bottom: var(--border);
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-icon { width: 32px; height: 32px; border-radius: 50%; border: var(--border); background: var(--bg-page); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .group-quick-card { cursor: pointer; transition: box-shadow 0.1s, transform 0.1s; }
    .group-quick-card:hover { box-shadow: var(--shadow-hover); transform: translate(2px,2px); }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main">
    <header id="topbar">
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div class="topbar-right">
        <a href="profile.html" class="topbar-user" id="topbar-user-link">
          <div class="avatar" id="topbar-avatar">?</div>
          <span class="topbar-username" id="topbar-username"></span>
        </a>
      </div>
    </header>
    <main id="content">

      <!-- Trust Score Hero -->
      <div class="trust-hero" id="trust-hero">
        <div>
          <div class="trust-label">Trust Score</div>
          <div style="font-size:var(--text-2xl);font-weight:700" id="trust-tagline">Loading…</div>
          <div id="trust-pill"></div>
        </div>
        <div class="trust-score-box">
          <div class="trust-score-num" id="trust-score-num">—</div>
          <div class="trust-score-label">Reliability</div>
        </div>
      </div>

      <!-- Two columns: Balance + Actions -->
      <div class="two-col" style="margin-bottom:var(--space-6)">

        <!-- Balance Breakdown -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Balance Breakdown</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:var(--space-3)">
            <div>
              <div class="balance-label">You Are Owed</div>
              <div class="balance-amount text-blue" id="dash-owed">—</div>
            </div>
            <hr class="divider-dashed">
            <div>
              <div class="balance-label">You Owe</div>
              <div class="balance-amount text-red" id="dash-owes">—</div>
            </div>
            <hr class="divider">
            <div>
              <div class="balance-label">Net Position</div>
              <div class="balance-amount" id="dash-net">—</div>
            </div>
            <div id="dash-balance-action"></div>
          </div>
        </div>

        <!-- Immediate Actions -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Immediate Actions</span>
          </div>
          <div id="dash-actions-list">
            <div class="empty-state" style="padding:var(--space-6)">Loading…</div>
          </div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="card" style="margin-bottom:var(--space-6)">
        <div class="card-header">
          <span class="card-title">Recent Activity</span>
          <a href="activity.html" class="section-link">Full History →</a>
        </div>
        <div id="dash-activity-list">
          <div class="empty-state" style="padding:var(--space-6)">Loading…</div>
        </div>
      </div>

      <!-- Your Groups Quick View -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Your Groups</span>
          <a href="groups.html" class="section-link">All Groups →</a>
        </div>
        <div class="grid-4" id="dash-groups-grid" style="gap:var(--space-4)">
          <div class="empty-state" style="padding:var(--space-6)">Loading…</div>
        </div>
      </div>

    </main>
  </div>
  <div id="bottom-nav"></div>
</div>

<div id="toast-container"></div>
<script type="module" src="js/pages/dashboard.js?v=2"></script>
</body>
</html>
