<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Groups — Resolv</title>
  <meta name="description" content="View, create and join expense groups.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main">
    <header id="topbar">
      <span class="topbar-title">My Groups</span>
      <div class="topbar-right">
        <a href="profile.html" class="topbar-user">
          <div class="avatar" id="topbar-avatar">?</div>
          <span class="topbar-username" id="topbar-username"></span>
        </a>
      </div>
    </header>
    <main id="content">

      <div class="page-header">
        <h1 class="page-title">My Groups</h1>
        <div class="page-actions">
          <button class="btn btn-outline" id="btn-join-group">+ Join Group</button>
          <button class="btn btn-primary" id="btn-create-group">+ Create Group</button>
        </div>
      </div>

      <div class="grid-auto" id="groups-grid">
        <!-- filled by groups.js -->
      </div>

    </main>
  </div>
  <div id="bottom-nav"></div>
</div>

<!-- Create Group Modal -->
<div class="modal-overlay" id="modal-create-group" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Create Group</span>
      <button class="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="cg-name">Group Name</label>
        <input class="form-input" type="text" id="cg-name" placeholder="Goa Trip" required>
        <span class="form-error" id="cg-name-error"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="cg-currency">Currency</label>
        <div class="select-wrapper">
          <select class="form-select" id="cg-currency">
            <option value="INR">INR — Indian Rupee</option>
            <option value="USD">USD — US Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
            <option value="SGD">SGD — Singapore Dollar</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Emoji (optional)</label>
        <div id="emoji-picker" style="display:flex;flex-wrap:wrap;gap:8px">
          <span class="emoji-opt" data-emoji="🏖️">🏖️</span>
          <span class="emoji-opt" data-emoji="🏠">🏠</span>
          <span class="emoji-opt" data-emoji="✈️">✈️</span>
          <span class="emoji-opt" data-emoji="🍕">🍕</span>
          <span class="emoji-opt" data-emoji="🎉">🎉</span>
          <span class="emoji-opt" data-emoji="⚽">⚽</span>
          <span class="emoji-opt" data-emoji="🎵">🎵</span>
          <span class="emoji-opt" data-emoji="📚">📚</span>
          <span class="emoji-opt" data-emoji="🚗">🚗</span>
          <span class="emoji-opt" data-emoji="🏕️">🏕️</span>
          <span class="emoji-opt" data-emoji="💼">💼</span>
          <span class="emoji-opt" data-emoji="🌍">🌍</span>
        </div>
        <input type="hidden" id="cg-emoji" value="">
      </div>
      <div class="form-group">
        <label class="form-label" for="cg-description">Description (optional)</label>
        <textarea class="form-textarea" id="cg-description" placeholder="What's this group for?"></textarea>
      </div>
      <span class="form-error" id="cg-global-error"></span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cg-cancel">Cancel</button>
      <button class="btn btn-primary" id="cg-submit">Create</button>
    </div>
  </div>
</div>

<!-- Join Group Modal -->
<div class="modal-overlay" id="modal-join-group" hidden>
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title">Join Group</span>
      <button class="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="jg-code">Invite Code</label>
        <input class="form-input mono" type="text" id="jg-code"
               placeholder="ENTER CODE" maxlength="20"
               style="text-transform:uppercase">
        <span class="form-error" id="jg-code-error"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="jg-cancel">Cancel</button>
      <button class="btn btn-primary" id="jg-submit">Join</button>
    </div>
  </div>
</div>

<style>
  .emoji-opt { font-size: 22px; cursor: pointer; padding: 4px; border-radius: 4px; border: 2px solid transparent; transition: border-color 0.1s; }
  .emoji-opt.selected { border-color: #0A0A0A; background: var(--yellow); }
  .emoji-opt:hover { border-color: #0A0A0A; }
</style>

<div id="toast-container"></div>
<script type="module" src="js/pages/groups.js"></script>
</body>
</html>
