<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolv | Loading...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: { 'comic': '6px 6px 0px 0px rgba(0,0,0,1)' }
                }
            }
        }
    </script>
</head>
<body class="bg-yellow-300 text-black min-h-screen flex items-center justify-center">

    <div class="text-center animate-pulse">
        <h1 class="text-7xl font-black uppercase italic tracking-tighter mb-4">Resolv<span class="text-purple-400">.</span></h1>
        <div class="border-4 border-black bg-white px-6 py-2 shadow-comic inline-block font-black uppercase tracking-widest text-sm">
            Initializing Engine...
        </div>
    </div>

    <script type="module">
        import { auth } from './js/core/auth.js';

        // Brief timeout to allow the splash screen to render before redirecting
        setTimeout(() => {
            if (auth.isAuthenticated()) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        }, 1000);
    </script>
</body>
</html>
